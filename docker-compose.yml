services:
  # FastAPI 앱 컨테이너
  app:
    build: .                    # 현재 폴더의 Dockerfile 로 빌드
    ports:
      - "8000:8000"             # 내 컴퓨터:컨테이너 포트 연결
    env_file:
      - .env                    # .env 파일에서 환경변수 로드
    depends_on:
      - db                      # db 컨테이너가 먼저 실행된 후 app 실행
    restart: always             # 오류로 꺼지면 자동 재시작

  # PostgreSQL DB 컨테이너
  db:
    image: postgres:15          # Docker Hub 에서 PostgreSQL 15 이미지 사용
    environment:
      POSTGRES_USER: myuser         # DB 아이디
      POSTGRES_PASSWORD: mypassword # DB 비밀번호
      POSTGRES_DB: mydb             # DB 이름
    ports:
      - "5432:5432"             # 내 컴퓨터:컨테이너 포트 연결
    volumes:
      - postgres_data:/var/lib/postgresql/data  # 데이터 영구 저장
                                                # 컨테이너 꺼져도 데이터 유지

# 볼륨 정의 (데이터 영구 저장 공간)
volumes:
  postgres_data:
